<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resources &middot; AFEX Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
  .page-head{ margin-bottom:36px; }
  .page-title{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:700; font-size:clamp(2.4rem,5vw,3.6rem); line-height:1.1; letter-spacing:-.01em;
    background:linear-gradient(100deg,var(--red-deep),var(--rose)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; padding-bottom:.08em; }
  .page-sub{ font-size:.95rem; color:var(--soft); font-weight:500; margin-top:.4rem; }

  .section-label{ font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); font-weight:700; margin:8px 0 18px; }

  .tool-grid{ display:grid; grid-template-columns:repeat(auto-fill,168px); gap:14px; justify-content:start; margin-bottom:44px; }
  .tool-btn{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; text-decoration:none;
    width:168px; height:168px; padding:16px 12px; border-radius:20px; font-size:.85rem; font-weight:700; letter-spacing:-.01em;
    color:#fff; background:linear-gradient(135deg,var(--red),var(--rose));
    box-shadow:0 10px 26px -10px rgba(201,6,58,.5), 0 1px 0 rgba(255,255,255,.25) inset;
    transition:transform .25s var(--ease), box-shadow .25s var(--ease); }
  .tool-btn:hover{ transform:translateY(-4px); box-shadow:0 18px 34px -12px rgba(201,6,58,.6), 0 1px 0 rgba(255,255,255,.25) inset; }
  .tool-btn.pending{ opacity:.72; }
  .tool-btn svg{ width:30px; height:30px; flex-shrink:0; }

  .bm-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(0,152px)); gap:14px; justify-content:start; }
  .bm{ position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
    text-align:center; text-decoration:none; color:inherit;
    width:152px; height:152px; padding:18px 12px; border-radius:20px;
    background:linear-gradient(150deg,rgba(255,255,255,.72),rgba(255,255,255,.4));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 12px 30px -16px rgba(16,14,20,.3), 0 1px 0 rgba(255,255,255,.9) inset;
    transition:transform .28s var(--ease), box-shadow .28s var(--ease), border-color .28s var(--ease); }
  .bm:hover{ transform:translateY(-5px); border-color:rgba(201,6,58,.35); box-shadow:0 22px 44px -18px rgba(201,6,58,.4), 0 1px 0 rgba(255,255,255,.9) inset; }
  .bm-ic{ position:relative; z-index:1; width:52px; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--red),var(--rose)); color:#fff;
    box-shadow:0 8px 18px -8px rgba(201,6,58,.55); transition:transform .28s var(--ease); }
  .bm:hover .bm-ic{ transform:scale(1.07); }
  .bm-ic svg{ width:25px; height:25px; }
  .bm-name{ position:relative; z-index:1; font-size:.86rem; font-weight:700; letter-spacing:-.01em; }
  .bm-out{ position:absolute; top:11px; right:11px; z-index:1; width:15px; height:15px; color:var(--soft); opacity:0; transition:opacity .28s var(--ease), transform .28s var(--ease); transform:translate(-3px,3px); }
  .bm:hover .bm-out{ opacity:.75; transform:translate(0,0); }
</style>
</head>
<body>
  <div class="page">
    <div class="aura" aria-hidden="true">
      <div class="wash" style="width:44vw;height:44vw;right:-8vw;top:-12vh;background:radial-gradient(circle at center,rgba(201,6,58,.22),transparent 64%);animation:wf3 34s ease-in-out infinite;"></div>
      <div class="wash" style="width:40vw;height:40vw;left:-6vw;bottom:6vh;background:radial-gradient(circle at center,rgba(244,63,111,.2),transparent 64%);animation:wf2 40s ease-in-out infinite;"></div>
      <div class="wash" style="width:38vw;height:38vw;left:36vw;top:8vh;background:radial-gradient(circle at center,rgba(255,138,170,.18),transparent 62%);animation:wf1 46s ease-in-out infinite;"></div>
    </div>
    <div class="grain" aria-hidden="true" style="z-index:1;"></div>
    <div class="sheen" aria-hidden="true" style="z-index:1;"></div>

    <div class="page-content">
      <span id="nav-slot"></span>

      <div class="page-head anim-rise">
        <div class="page-title">Resources</div>
        <div class="page-sub">Quick references, tools, and the sites you open every day.</div>
      </div>

      <div class="section-label anim-rise" style="--d:80ms">Quick Steps / Useful Tools</div>
      <div class="tool-grid anim-rise" style="--d:120ms" id="toolGrid"></div>

      <div class="section-label anim-rise" style="--d:180ms">Bookmarks</div>
      <div class="bm-grid anim-rise" style="--d:220ms" id="bmGrid"></div>
    </div>
  </div>

<script src="../assets/nav.js"></script>
<script>
  mountNav('Resources', '../');

  const TOOLS = [
    { label:'AUS Help', url:'../documents/aus-help.pdf',

    { label:'Welcome', url:null,

    { label:'SSI', url:null,

    { label:'Reviews', url:null,
      icon:'<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>' },
    { label:'SSI Award Guide', url:null,
      icon:'<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>' },
    { label:'Income Calculator', url:'https://app.uwm.com/income-calculator', external:true,
      icon:'<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><path d="M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01M8 19h.01M12 19h.01M16 19h.01"/>' },
    { label:'Amortization Calculator', url:'../documents/amm-calculator.xlsx',
      icon:'<path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-8"/>' }
  ];

  const BOOKMARKS = [
    { label:'Arive',    url:'https://auth.lendwize.io/u/login?state=hKFo2SA3WmtHQ3o0WWxOZkFJQUVFMlNQLUxnUTh1dG5xYTNHU6Fur3VuaXZlcnNhbC1sb2dpbqN0aWTZIHotcF9SRE15cWRKaGJUT1NGYm5uZDFVLXptRVlQV19Jo2NpZNkgRFJCZWRXYnB5QlQwSGVKMmVaMlpEdzl0OXBSN3hmdUQ&ui_locales=en',

    { label:'Dialer',   url:'https://afexmortgage2.talkitpro.com/agc/vicidial.php',
      icon:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>' },

  const OUT_SVG = '<svg class="bm-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>';

  document.getElementById('toolGrid').innerHTML = TOOLS.map(function(t){
    const href = t.url ? t.url : '#';
    const tab = t.external ? ' target="_blank" rel="noopener"' : '';
    const cls = t.url ? 'tool-btn' : 'tool-btn pending';
    return '<a class="'+cls+'" href="'+href+'"'+tab+'>'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">'+t.icon+'</svg>'+
      t.label+
    '</a>';
  }).join('');

  document.getElementById('bmGrid').innerHTML = BOOKMARKS.map(function(b){
    return '<a class="bm" href="'+b.url+'" target="_blank" rel="noopener">'+
      OUT_SVG+
      '<span class="bm-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">'+b.icon+'</svg></span>'+
      '<span class="bm-name">'+b.label+'</span>'+
    '</a>';
  }).join('');
</script>
</body>
</html>
